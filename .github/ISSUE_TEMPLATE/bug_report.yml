name: Bug report
description: Report a reproducible problem in the library
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove API keys, access tokens, refresh tokens,
        customer data and order data before submitting.
  - type: input
    id: version
    attributes:
      label: Package version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.19.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest safe code sample that reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Do not paste credentials, tokens, personal data or complete API payloads.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, tokens and personal data.
          required: true
        - label: I searched existing issues.
          required: true
